<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trading AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0e17;
            --card: #1a1f2e;
            --card2: #1e2433;
            --border: #2a3040;
            --green: #00ff88;
            --red: #ff4757;
            --gold: #ffd700;
            --blue: #4a9eff;
            --text: #e0e0e0;
            --dim: #888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 90px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: var(--card);
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--green), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sync-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }

        .sync-status.connected {
            color: var(--green);
            border-color: var(--green);
            background: rgba(0,255,136,0.1);
        }

        /* Main Container */
        .container {
            padding: 16px;
        }

        /* Coin Selector */
        .coin-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .coin-selector::-webkit-scrollbar {
            display: none;
        }

        .coin-btn {
            padding: 12px 20px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .coin-btn:active {
            transform: scale(0.95);
        }

        .coin-btn.active {
            background: linear-gradient(135deg, var(--blue), #6b5ce7);
            border-color: var(--blue);
            color: #fff;
            box-shadow: 0 4px 15px rgba(74,158,255,0.4);
        }

        /* Price Display */
        .price-section {
            background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .price-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .price-left {
            flex: 1;
        }

        .symbol-name {
            color: var(--dim);
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .current-price {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .price-right {
            text-align: right;
        }

        .price-change {
            font-size: 1rem;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 600;
        }

        .price-change.up {
            background: rgba(0, 255, 136, 0.15);
            color: var(--green);
        }

        .price-change.down {
            background: rgba(255, 71, 87, 0.15);
            color: var(--red);
        }

        /* Mini Chart */
        .mini-chart {
            height: 100px;
            margin: 10px 0;
        }

        #priceChart {
            width: 100%;
            height: 100px;
        }

        .price-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--dim);
        }

        .price-meta span {
            color: var(--text);
        }

        /* AI Signal Card */
        .signal-card {
            background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
            border-radius: 20px;
            padding: 24px 20px;
            border: 2px solid var(--border);
            margin-bottom: 16px;
            text-align: center;
        }

        .signal-card.buy { border-color: var(--green); box-shadow: 0 0 30px rgba(0,255,136,0.15); }
        .signal-card.sell { border-color: var(--red); box-shadow: 0 0 30px rgba(255,71,87,0.15); }
        .signal-card.hold { border-color: var(--gold); }

        .signal-label {
            font-size: 0.8rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .signal-value {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .buy .signal-value { color: var(--green); }
        .sell .signal-value { color: var(--red); }
        .hold .signal-value { color: var(--gold); }

        .signal-reason {
            font-size: 0.85rem;
            color: var(--dim);
            margin-bottom: 20px;
        }

        /* Trade Levels */
        .trade-levels {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .level-box {
            background: rgba(0,0,0,0.3);
            padding: 16px 12px;
            border-radius: 14px;
            text-align: center;
        }

        .level-box.entry { border-left: 3px solid var(--blue); }
        .level-box.sl { border-left: 3px solid var(--red); }
        .level-box.target { border-left: 3px solid var(--green); }

        .level-label {
            font-size: 0.7rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .level-value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Trade Buttons */
        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .trade-btn {
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .trade-btn:active {
            transform: scale(0.95);
        }

        .trade-btn.long {
            background: linear-gradient(135deg, var(--green), #00cc6a);
            color: #000;
            box-shadow: 0 4px 15px rgba(0,255,136,0.3);
        }

        .trade-btn.short {
            background: linear-gradient(135deg, var(--red), #cc3a4a);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255,71,87,0.3);
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 6px;
        }

        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }
        .stat-value.gold { color: var(--gold); }

        /* AI Learning Card */
        .ai-card {
            background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--gold);
            margin-bottom: 16px;
        }

        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .ai-title {
            font-size: 1rem;
            color: var(--gold);
            font-weight: 600;
        }

        .ai-badge {
            background: linear-gradient(135deg, var(--gold), #ffb700);
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .ai-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin: 12px 0;
        }

        .ai-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--red), var(--gold), var(--green));
            border-radius: 4px;
            transition: width 0.5s;
        }

        .ai-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--dim);
        }

        /* Trade History */
        .history-section {
            background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .clear-btn {
            background: rgba(255,71,87,0.15);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .trade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }

        .trade-item.win { border-left-color: var(--green); }
        .trade-item.loss { border-left-color: var(--red); }
        .trade-item.pending { border-left-color: var(--gold); }

        .trade-info {
            flex: 1;
        }

        .trade-type {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .trade-details {
            font-size: 0.75rem;
            color: var(--dim);
        }

        .trade-pnl {
            font-weight: 700;
            font-size: 1rem;
            text-align: right;
        }

        .trade-pnl.positive { color: var(--green); }
        .trade-pnl.negative { color: var(--red); }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--dim);
            font-size: 0.65rem;
            padding: 6px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: var(--green);
            background: rgba(0,255,136,0.1);
        }

        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 2000;
            font-weight: 600;
            animation: toastIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,255,136,0.2);
            white-space: nowrap;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--dim);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--dim);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Mobile Optimizations */
        @media (max-width: 380px) {
            .current-price { font-size: 1.8rem; }
            .signal-value { font-size: 2.2rem; }
            .coin-btn { padding: 10px 14px; font-size: 0.85rem; }
            .trade-levels { grid-template-columns: 1fr; }
            .level-box { display: flex; justify-content: space-between; }
        }

        @media (min-width: 768px) {
            .container { max-width: 500px; margin: 0 auto; }
            .price-section { padding: 24px; }
        }
    </style>
</head>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBDLmMtntHYoTphSRM3g7L9r3iKJznkUZI",
            authDomain: "paper-trader-ai.firebaseapp.com",
            projectId: "paper-trader-ai",
            storageBucket: "paper-trader-ai.firebasestorage.app",
            messagingSenderId: "774261830875",
            appId: "1:774261830875:web:2aa41fe2f39c203ecf08fe"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // State
        let currentSymbol = 'BTCUSDT';
        let currentPrice = 0;
        let priceData = [];
        let balance = 10000; // INR
        let trades = [];
        let aiLearning = { correct: 0, total: 0 };
        let lastSignalPrev = 0;
        let autoTrade = true;
        let lastAutoTrade = 0;
        let aiConfidence = 60;
        let consecutiveLoss = 0;
        const INR_RATE = 83; // 1 USD = 83 INR

        // Toast
        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Format INR
        function fmt(num, d = 2) {
            if (num >= 1000) return '₹' + num.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
            return '₹' + num.toFixed(d);
        }
        function fmtUSD(num, d = 2) {
            return '$' + num.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
        }

        // Fetch Kline
        async function fetchKlines(symbol, interval = '1h', limit = 100) {
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
                const data = await r.json();
                if (!data || data.length === 0) throw new Error('No data');
                return data.map(k => ({
                    time: k[0], open: +k[1], high: +k[2], low: +k[3], close: +k[4], volume: +k[5]
                }));
            } catch (e) {
                console.log('Klines error:', e);
                return null;
            }
        }

        // Fetch Ticker
        async function fetchTicker(symbol) {
            try {
                const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
                return await r.json();
            } catch (e) {
                console.log('Ticker error:', e);
                return null;
            }
        }

        // Indicators
        function calcEMA(data, period) {
            const k = 2 / (period + 1);
            let ema = [data[0].close];
            for (let i = 1; i < data.length; i++) ema.push(data[i].close * k + ema[i - 1] * (1 - k));
            return ema;
        }

        function calcRSI(data, period = 14) {
            let gains = [], losses = [];
            for (let i = 1; i < data.length; i++) {
                const ch = data[i].close - data[i - 1].close;
                gains.push(ch > 0 ? ch : 0);
                losses.push(ch < 0 ? -ch : 0);
            }
            let ag = gains.slice(0, period).reduce((a, b) => a + b) / period;
            let al = losses.slice(0, period).reduce((a, b) => a + b) / period;
            let rsi = [50];
            for (let i = period; i < gains.length; i++) {
                ag = (ag * (period - 1) + gains[i]) / period;
                al = (al * (period - 1) + losses[i]) / period;
                rsi.push(100 - (100 / (1 + ag / (al || 0.001))));
            }
            return rsi;
        }

        // AI Analysis
        function analyzeSignal(data) {
            if (data.length < 50) return { signal: 'HOLD', reason: 'Analyzing...', confidence: 0 };

            const ema9 = calcEMA(data, 9);
            const ema21 = calcEMA(data, 21);
            const ema55 = calcEMA(data, 55);
            const rsi = calcRSI(data, 14);
            const macdLine = calcEMA(data, 12);
            const signalLine = calcEMA(data, 26);
            const last = data.length - 1;

            const price = data[last].close;
            const rsiVal = rsi[rsi.length - 1] || 50;
            const rsiPrev = rsi[rsi.length - 2] || 50;
            const rsiPrev2 = rsi[rsi.length - 3] || 50;
            const macd = macdLine[last] - signalLine[last];
            const macdPrev = macdLine[last-1] - signalLine[last-1];
            const volume = data[last].volume;

            let score = 0, reasons = [];

            // RSI analysis
            if (rsiVal < 30 && rsiVal > rsiPrev) { score += 4; reasons.push('RSI Oversold'); }
            else if (rsiVal < 40 && rsiVal > rsiPrev && rsiVal > rsiPrev2) { score += 2; reasons.push('RSI Recovering'); }
            else if (rsiVal > 70 && rsiVal < rsiPrev) { score -= 4; reasons.push('RSI Overbought'); }
            else if (rsiVal > 60 && rsiVal < rsiPrev && rsiVal < rsiPrev2) { score -= 2; reasons.push('RSI Weakening'); }

            // EMA crossover
            if (ema9[last] > ema21[last] && ema9[last-1] <= ema21[last-1]) { score += 3; reasons.push('Golden Cross'); }
            else if (ema9[last] < ema21[last] && ema9[last-1] >= ema21[last-1]) { score -= 3; reasons.push('Death Cross'); }
            else if (price > ema55[last] && ema9[last] > ema21[last]) { score += 2; reasons.push('Uptrend'); }
            else if (price < ema55[last] && ema9[last] < ema21[last]) { score -= 2; reasons.push('Downtrend'); }

            // MACD
            if (macd > 0 && macdPrev <= 0) { score += 2; reasons.push('MACD Bullish'); }
            else if (macd < 0 && macdPrev >= 0) { score -= 2; reasons.push('MACD Bearish'); }

            if (reasons.length === 0) reasons.push('No clear signal');

            let signal = 'HOLD';
            let entry = price, sl, target;

            if (score >= 4) {
                signal = 'BUY';
                sl = price * 0.995;
                target = price * 1.025;
            } else if (score <= -4) {
                signal = 'SELL';
                sl = price * 1.005;
                target = price * 0.975;
            }

            const confidence = Math.min(95, Math.max(30, 50 + Math.abs(score) * 8 + Math.abs(rsiVal - 50) * 0.5));
            return { signal, reason: reasons.join(' | '), entry, sl, target, confidence: Math.round(confidence) };
        }

        // Draw Chart
        function drawChart(data) {
            const canvas = document.getElementById('priceChart');
            const ctx = canvas.getContext('2d');
            const w = canvas.width = canvas.parentElement.offsetWidth;
            const h = canvas.height = 100;
            ctx.clearRect(0, 0, w, h);
            if (!data || data.length < 2) return;

            const closes = data.map(d => d.close);
            const min = Math.min(...closes) * 0.999;
            const max = Math.max(...closes) * 1.001;
            const range = max - min || 1;

            const up = data[data.length - 1].close >= data[0].close;
            const color = up ? '#00ff88' : '#ff4757';

            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            closes.forEach((c, i) => {
                const x = (i / (closes.length - 1)) * w;
                const y = h - ((c - min) / range) * h;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();

            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();
            ctx.fillStyle = up ? 'rgba(0,255,136,0.1)' : 'rgba(255,71,87,0.1)';
            ctx.fill();
        }

        // Update UI
        async function updateUI() {
            try {
                const klines = await fetchKlines(currentSymbol, '1h', 100);
                const ticker = await fetchTicker(currentSymbol);

                if (!ticker) {
                    document.getElementById('currentPrice').innerHTML = '<span style="color:#ff4444">❌ API Error - Refresh karo</span>';
                    showToast('API error - check internet');
                    return;
                }

                if (klines) priceData = klines;
                currentPrice = +ticker.lastPrice;
                const changePct = +ticker.priceChangePercent;

            document.getElementById('currentPrice').textContent = fmtUSD(currentPrice) + ' | ₹' + fmt(currentPrice * INR_RATE);
            document.getElementById('symbolName').textContent = currentSymbol.replace('USDT', '/USDT');
            const changeEl = document.getElementById('priceChange');
            changeEl.textContent = (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%';
            changeEl.className = 'price-change ' + (changePct >= 0 ? 'up' : 'down');
            document.getElementById('high24').textContent = fmtUSD(+ticker.highPrice);
            document.getElementById('low24').textContent = fmtUSD(+ticker.lowPrice);
            document.getElementById('volume').textContent = (+ticker.volume / 1000).toFixed(1) + 'K';

            drawChart(klines);

            const analysis = analyzeSignal(klines);
            const card = document.getElementById('signalCard');
            card.className = 'signal-card ' + analysis.signal.toLowerCase();
            document.getElementById('signalValue').textContent = analysis.signal;
            document.getElementById('signalReason').textContent = analysis.reason;

            if (analysis.signal !== 'HOLD') {
                document.getElementById('entryPrice').textContent = fmtUSD(analysis.entry);
                document.getElementById('stopLoss').textContent = fmtUSD(analysis.sl);
                document.getElementById('targetPrice').textContent = fmtUSD(analysis.target);
            } else {
                document.getElementById('entryPrice').textContent = '-';
                document.getElementById('stopLoss').textContent = '-';
                document.getElementById('targetPrice').textContent = '-';
            }

            updateStats();
            checkTrades();
        }

        // Stats
        function updateStats() {
            const closed = trades.filter(t => t.status === 'closed');
            const wins = closed.filter(t => t.pnl > 0);
            const totalPnl = closed.reduce((s, t) => s + t.pnl, 0);

            document.getElementById('balance').textContent = fmt(balance);
            const pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + fmt(totalPnl);
            pnlEl.className = 'stat-value ' + (totalPnl >= 0 ? 'green' : 'red');
            document.getElementById('winRate').textContent = closed.length > 0 ? Math.round((wins.length / closed.length) * 100) + '%' : '0%';
            document.getElementById('aiAccuracy').textContent = aiLearning.total > 0 ? Math.round((aiLearning.correct / aiLearning.total) * 100) + '%' : '0%';
            document.getElementById('aiConf').textContent = aiConfidence + '%';
            document.getElementById('totalTrades').textContent = closed.length;

            const acc = aiLearning.total > 0 ? Math.round((aiLearning.correct / aiLearning.total) * 100) : 0;
            document.getElementById('aiAccuracy').textContent = acc + '%';
            document.getElementById('aiBar').style.width = Math.max(acc, 10) + '%';
            document.getElementById('aiCorrect').textContent = aiLearning.correct;
            document.getElementById('aiTotal').textContent = aiLearning.total;

            renderHistory();
        }

        function renderHistory() {
            const el = document.getElementById('tradeHistory');
            if (trades.length === 0) {
                el.innerHTML = '<div class="empty-state"><div class="icon">📊</div><div>No trades yet</div></div>';
                return;
            }
            el.innerHTML = trades.slice().reverse().slice(0, 15).map(t => {
                const cls = t.status === 'closed' ? (t.pnl > 0 ? 'win' : 'loss') : 'pending';
                return `
                    <div class="trade-item ${cls}">
                        <div class="trade-info">
                            <div class="trade-type">${t.type === 'long' ? '📈' : '📉'} ${t.type.toUpperCase()}</div>
                            <div class="trade-details">Entry: $${fmt(t.entry)} | ${t.status === 'closed' ? 'Exit: $' + fmt(t.exit) : 'Target: $' + fmt(t.target)}</div>
                        </div>
                        <div class="trade-pnl ${t.pnl > 0 ? 'positive' : t.pnl < 0 ? 'negative' : ''}">${t.status === 'closed' ? (t.pnl >= 0 ? '+' : '') + '$' + fmt(t.pnl) : '⏳'}</div>
                    </div>
                `;
            }).join('');
        }

        // Open Trade
        function openTrade(type) {
            const analysis = analyzeSignal(priceData);
            if (analysis.signal === 'HOLD') { showToast('Wait for signal!'); return; }

            const riskPct = 2;
            const riskAmount = balance * (riskPct / 100);
            const slDist = type === 'long' ? currentPrice - analysis.sl : analysis.sl - currentPrice;
            if (slDist <= 0) return;

            const size = riskAmount / slDist;
            const cost = size * currentPrice;
            if (cost > balance) { showToast('Insufficient!'); return; }

            trades.push({
                type, symbol: currentSymbol, entry: currentPrice,
                sl: analysis.sl, target: analysis.target, size, status: 'open', pnl: 0
            });
            saveData();
            updateStats();
            showToast(type.toUpperCase() + ' opened!');
        }

        // Auto Trade Logic
        function autoTrade() {
            if (!autoTrade) return;
            if (balance < 100) { showToast('Balance low!'); return; }
            if (trades.filter(t => t.status === 'open').length >= 2) return;

            const analysis = analyzeSignal(priceData);
            if (analysis.signal === 'HOLD') return;
            if (analysis.confidence < aiConfidence) return;

            const openTrades = trades.filter(t => t.status === 'open');
            if (openTrades.length > 0) return;

            const type = analysis.signal === 'BUY' ? 'long' : 'short';
            const slDist = type === 'long' ? currentPrice - analysis.sl : analysis.sl - currentPrice;
            if (slDist <= 0) return;

            const riskAmount = balance * 0.02;
            const size = riskAmount / slDist;
            const cost = size * currentPrice;
            if (cost > balance) return;

            trades.push({
                type, symbol: currentSymbol, entry: currentPrice,
                sl: analysis.sl, target: analysis.target, size, status: 'open', pnl: 0,
                confidence: analysis.confidence, reason: analysis.reason, time: Date.now()
            });
            saveData();
            updateStats();
            showToast('🤖 AI ' + type.toUpperCase() + ' @ ₹' + fmt(currentPrice));
        }

        // Check Trades
        function checkTrades() {
            let updated = false;
            for (const t of trades) {
                if (t.status !== 'open') continue;
                if (t.type === 'long') {
                    if (currentPrice <= t.sl) {
                        t.status = 'closed'; t.exit = t.sl;
                        t.pnl = (t.exit - t.entry) * t.size;
                        balance += t.pnl;
                        aiLearning.total++;
                        if (t.pnl > 0) { aiLearning.correct++; consecutiveLoss = 0; }
                        else { consecutiveLoss++; aiConfidence = Math.max(40, aiConfidence - 5); }
                        updated = true;
                    }
                    else if (currentPrice >= t.target) {
                        t.status = 'closed'; t.exit = t.target;
                        t.pnl = (t.exit - t.entry) * t.size;
                        balance += t.pnl;
                        aiLearning.total++;
                        aiLearning.correct++;
                        consecutiveLoss = 0;
                        aiConfidence = Math.min(85, aiConfidence + 2);
                        updated = true;
                    }
                } else {
                    if (currentPrice >= t.sl) {
                        t.status = 'closed'; t.exit = t.sl;
                        t.pnl = (t.entry - t.exit) * t.size;
                        balance += t.pnl;
                        aiLearning.total++;
                        if (t.pnl > 0) { aiLearning.correct++; consecutiveLoss = 0; }
                        else { consecutiveLoss++; aiConfidence = Math.max(40, aiConfidence - 5); }
                        updated = true;
                    }
                    else if (currentPrice <= t.target) {
                        t.status = 'closed'; t.exit = t.target;
                        t.pnl = (t.entry - t.exit) * t.size;
                        balance += t.pnl;
                        aiLearning.total++;
                        aiLearning.correct++;
                        consecutiveLoss = 0;
                        aiConfidence = Math.min(85, aiConfidence + 2);
                        updated = true;
                    }
                }
            }
            // Stop auto-trade if 3 consecutive losses
            if (consecutiveLoss >= 3) {
                autoTrade = false;
                showToast('⚠️ Auto-trade paused due to 3 losses');
            }
            if (updated) { saveData(); updateStats(); }
        }

        // Firebase
        async function loadData() {
            try {
                const doc = await db.collection('traders').doc('user1').get();
                if (doc.exists) {
                    const d = doc.data();
                    balance = d.balance || 10000;
                    trades = d.trades || [];
                    aiLearning = d.aiLearning || { correct: 0, total: 0 };
                    document.getElementById('syncStatus').textContent = '✅ Synced';
                    document.getElementById('syncStatus').className = 'sync-status connected';
                    showToast('Loaded!');
                }
            } catch (e) {
                document.getElementById('syncStatus').textContent = 'Local';
            }
            updateStats();
        }

        async function saveData() {
            const data = { balance, trades, aiLearning, lastUpdate: Date.now() };
            localStorage.setItem('tradingAI', JSON.stringify(data));
            try { await db.collection('traders').doc('user1').set(data); } catch (e) {}
        }

        // Events
        document.querySelectorAll('.coin-btn').forEach(b => b.onclick = () => {
            document.querySelector('.coin-btn.active').classList.remove('active');
            b.classList.add('active');
            currentSymbol = b.dataset.symbol;
            updateUI();
        });

        document.getElementById('btnLong').onclick = () => openTrade('long');
        document.getElementById('btnShort').onclick = () => openTrade('short');
        document.getElementById('clearHistory').onclick = () => {
            if (confirm('Clear all?')) { trades = []; balance = 10000; aiLearning = { correct: 0, total: 0 }; saveData(); updateStats(); showToast('Cleared!'); }
        };

        // Init
        async function init() {
            try {
                await loadData();
            } catch(e) {
                console.log('Load error:', e);
                document.getElementById('syncStatus').textContent = 'Local';
            }
            try {
                await updateUI();
            } catch(e) {
                console.log('UI error:', e);
                showToast('Data load ho raha hai...');
            }
            // Update every 30s
            setInterval(async () => {
                try { await updateUI(); } catch(e) {}
                autoTrade();
            }, 30000);
            // Manual trigger after 5s
            setTimeout(() => { try { autoTrade(); } catch(e) {} }, 5000);
        }
        init();

        // Auto trade toggle
        document.getElementById('autoToggle')?.addEventListener('click', () => {
            autoTrade = !autoTrade;
            consecutiveLoss = 0;
            aiConfidence = 60;
            showToast(autoTrade ? '🤖 Auto-trade ON' : '⏸ Auto-trade OFF');
        });
    </script>
</body>
</html>
